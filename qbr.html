<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QBR Generator · FRDM Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --yellow:         #DBE451;
      --yellow-dark:    #C7D14B;
      --blue-black:     #072637;
      --putty:          #B6A9A9;
      --off-white:      #F1EEE8;
      --blue-black-alt: #1A3658;
      --klein-blue:     #0085F2;
      --border:         rgba(255,255,255,0.1);
      --font-sans:      'DM Sans', 'Inter', system-ui, sans-serif;
      --font-serif:     'Playfair Display', 'Georgia', serif;
      --radius:         12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--off-white);
      color: var(--blue-black);
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      background: var(--blue-black);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    nav a.logo {
      font-size: 1.1rem; font-weight: 800; color: var(--off-white);
      text-decoration: none; letter-spacing: 0.02em;
    }
    nav a.logo span { color: var(--yellow); }
    nav .sep  { color: rgba(255,255,255,0.2); }
    nav .page { font-size: 0.85rem; color: var(--putty); letter-spacing: 0.06em; text-transform: uppercase; }

    /* ── Setup UI ── */
    .setup { max-width: 700px; margin: 3rem auto; padding: 0 2rem; }
    .setup h1 { font-size: 1.75rem; font-weight: 800; margin-bottom: 0.3rem; color: var(--blue-black); }
    .setup p  { color: #4a5a64; font-size: 0.95rem; margin-bottom: 2rem; }

    .upload-zone {
      border: 2px dashed rgba(7,38,55,0.25);
      border-radius: var(--radius);
      background: #fff;
      padding: 2.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 1.5rem;
    }
    .upload-zone:hover, .upload-zone.drag {
      border-color: var(--yellow-dark);
      background: rgba(219,228,81,0.07);
    }
    .upload-zone.loaded { border-color: #4caf72; background: rgba(76,175,114,0.06); }
    .upload-zone .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .upload-zone p { color: #4a5a64; font-size: 0.9rem; margin: 0; }
    .upload-zone p strong { color: var(--blue-black); }
    #file-input { display: none; }

    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .field label {
      display: block; font-size: 0.78rem; font-weight: 600;
      color: var(--blue-black-alt); margin-bottom: 0.35rem;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .field input {
      width: 100%; padding: 0.65rem 0.9rem;
      border: 1.5px solid rgba(7,38,55,0.2);
      border-radius: 8px;
      font-size: 0.95rem; font-family: var(--font-sans);
      color: var(--blue-black); background: #fff;
      outline: none; transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--klein-blue); }
    .field input::placeholder { color: #9aabB4; }

    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.7rem 1.5rem; border-radius: 8px; border: none;
      font-size: 0.9rem; font-weight: 700; font-family: var(--font-sans);
      cursor: pointer; transition: all 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--yellow); color: var(--blue-black); }
    .btn-primary:not(:disabled):hover { background: var(--yellow-dark); }
    .btn-outline {
      background: transparent; color: var(--blue-black);
      border: 1.5px solid rgba(7,38,55,0.3);
    }
    .btn-outline:hover { border-color: var(--klein-blue); color: var(--klein-blue); }

    .btn-row { display: flex; gap: 0.75rem; align-items: center; }
    #file-status { font-size: 0.85rem; color: #4a5a64; }

    /* ── Report ── */
    #report { display: none; }

    .report-actions {
      max-width: 900px; margin: 1.5rem auto 0; padding: 0 2rem;
      display: flex; gap: 0.75rem; align-items: center;
    }

    /* ── Slides ── */
    .slides {
      max-width: 900px; margin: 1rem auto 3rem; padding: 0 2rem;
      display: flex; flex-direction: column; gap: 1.5rem;
    }

    .slide {
      border-radius: var(--radius); overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
      background: #fff;
      page-break-inside: avoid;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* Cover slide */
    .slide-cover {
      background: var(--blue-black);
      border: 1px solid rgba(219,228,81,0.2);
      padding: 3.5rem 3rem;
      min-height: 220px;
      display: flex; flex-direction: column; justify-content: center;
    }
    .slide-cover .tag {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em;
      color: var(--yellow); text-transform: uppercase; margin-bottom: 0.75rem;
    }
    .slide-cover h1 { font-size: 2rem; font-weight: 800; color: var(--off-white); margin-bottom: 0.4rem; }
    .slide-cover .company { font-size: 1.2rem; color: var(--yellow); margin-bottom: 0.75rem; font-weight: 600; }
    .slide-cover .meta { font-size: 0.82rem; color: var(--putty); }

    /* Section header bar */
    .slide-header {
      background: var(--blue-black-alt);
      padding: 0.75rem 1.5rem;
    }
    .slide-header h2 {
      font-size: 1rem; font-weight: 700; color: var(--off-white);
      letter-spacing: 0.04em; text-transform: uppercase;
    }

    .slide-body { padding: 1.5rem; background: #fff; }

    /* Stat boxes */
    .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
    .stat-box {
      background: var(--blue-black-alt);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; padding: 0.9rem 1rem;
      text-align: center;
    }
    .stat-box .val { font-size: 1.5rem; font-weight: 800; color: var(--off-white); line-height: 1.1; }
    .stat-box .lbl { font-size: 0.7rem; color: var(--putty); margin-top: 0.3rem; line-height: 1.3; }
    .stat-box.accent { background: var(--blue-black); border-color: rgba(219,228,81,0.3); }
    .stat-box.accent .val { color: var(--yellow); }

    /* Bar charts */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    .chart-title {
      font-size: 0.78rem; font-weight: 700; color: var(--blue-black);
      margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em;
    }

    .bar-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; font-size: 0.78rem; }
    .bar-label { width: 140px; flex-shrink: 0; color: #2a3a44; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; background: #eaedf2; border-radius: 3px; height: 10px; overflow: hidden; }
    .bar-fill  { height: 10px; border-radius: 3px; }
    .bar-count { width: 30px; text-align: right; color: var(--putty); flex-shrink: 0; }

    /* Supplier rows */
    .supplier-row {
      display: flex; align-items: center; gap: 0.75rem;
      background: #f2f4f8; border-radius: 6px;
      padding: 0.5rem 0.75rem; margin-bottom: 0.4rem;
      font-size: 0.82rem;
    }
    .supplier-name { flex: 1; color: var(--blue-black); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .risk-chip {
      font-size: 0.68rem; font-weight: 700; color: #fff;
      padding: 2px 8px; border-radius: 20px; flex-shrink: 0;
    }
    .sub-text { font-size: 0.75rem; color: #6b7a85; flex-shrink: 0; }

    /* Bullets */
    .bullet-list { list-style: none; padding: 0; }
    .bullet-list li {
      padding: 0.35rem 0 0.35rem 1.2rem;
      position: relative; font-size: 0.88rem; color: #1a2a35; border-bottom: 1px solid #eaedf2;
    }
    .bullet-list li::before { content: "•"; position: absolute; left: 0; color: var(--klein-blue); }
    .bullet-list li:last-child { border-bottom: none; }

    /* Footer note */
    .slide-footer {
      font-size: 0.72rem; color: #8a96a0; text-align: center;
      padding: 0.75rem 1.5rem; border-top: 1px solid #eaedf2;
      background: #fff;
    }

    /* Print */
    @media print {
      body { background: #fff; }
      nav, .setup, .report-actions { display: none !important; }
      #report { display: block !important; }
      .slides { margin: 0; padding: 0; max-width: 100%; gap: 0; }
      .slide { border-radius: 0; box-shadow: none; margin-bottom: 0; page-break-after: always; }
      .slide:last-child { page-break-after: avoid; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo"><span>FRDM</span> Tools</a>
  <span class="sep">›</span>
  <span class="page">QBR Generator</span>
</nav>

<!-- ── Setup ── -->
<div class="setup" id="setup">
  <h1>📋 QBR Generator</h1>
  <p>Upload a FRDM supplier risk CSV to generate a printable Quarterly Business Review report.</p>

  <div class="upload-zone" id="upload-zone">
    <div class="icon">📂</div>
    <p><strong>Click to upload</strong> or drag &amp; drop</p>
    <p>Supplier risk report CSV from the FRDM platform</p>
    <input type="file" id="file-input" accept=".csv" />
  </div>

  <div class="options">
    <div class="field">
      <label>Customer name <span style="color:#aaa;font-weight:400">(optional)</span></label>
      <input type="text" id="company-name" placeholder="Leave blank to use Company ID from CSV" />
    </div>
    <div class="field">
      <label>Quarter / period</label>
      <input type="text" id="quarter" />
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="generate-btn" disabled>Generate Report</button>
    <span id="file-status" style="font-size:0.85rem;color:#666;"></span>
  </div>
</div>

<!-- ── Report ── -->
<div id="report">
  <div class="report-actions">
    <button class="btn btn-primary" onclick="window.print()">🖨 Print / Save as PDF</button>
    <button class="btn btn-outline" onclick="resetTool()">← Upload new file</button>
  </div>
  <div class="slides" id="slides"></div>
</div>

<script>
// ── Quarter default ──────────────────────────────────────────────────────────
(function() {
  const now = new Date();
  const q = Math.ceil((now.getMonth() + 1) / 3);
  document.getElementById('quarter').value = `Q${q} ${now.getFullYear()}`;
})();

// ── File upload ──────────────────────────────────────────────────────────────
let parsedRows = null;

const zone      = document.getElementById('upload-zone');
const fileInput = document.getElementById('file-input');
const genBtn    = document.getElementById('generate-btn');
const fileStatus = document.getElementById('file-status');

zone.addEventListener('click', () => fileInput.click());
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

function handleFile(file) {
  if (!file) return;
  Papa.parse(file, {
    header: true, skipEmptyLines: true,
    complete(result) {
      parsedRows = result.data;
      zone.classList.add('loaded');
      zone.querySelector('.icon').textContent = '✅';
      zone.querySelector('p').innerHTML = `<strong>${file.name}</strong>`;
      zone.querySelectorAll('p')[1].textContent = `${parsedRows.length.toLocaleString()} rows loaded`;
      genBtn.disabled = false;
      fileStatus.textContent = '';
    },
    error() { fileStatus.textContent = 'Could not parse file.'; }
  });
}

document.getElementById('generate-btn').addEventListener('click', () => {
  if (!parsedRows) return;
  const companyInput = document.getElementById('company-name').value.trim();
  const quarter = document.getElementById('quarter').value.trim() || 'QBR';
  const companyId = (parsedRows[0] && parsedRows[0]['id']) ? parsedRows[0]['id'] : 'Unknown';
  const displayName = companyInput || `Company ${companyId}`;
  buildReport(parsedRows, displayName, quarter);
});

function resetTool() {
  document.getElementById('report').style.display = 'none';
  document.getElementById('setup').style.display = 'block';
  parsedRows = null;
  zone.classList.remove('loaded');
  zone.querySelector('.icon').textContent = '📂';
  zone.querySelector('p').innerHTML = '<strong>Click to upload</strong> or drag &amp; drop';
  zone.querySelectorAll('p')[1].textContent = 'Supplier risk report CSV from the FRDM platform';
  genBtn.disabled = true;
  fileInput.value = '';
}

// ── Data helpers ─────────────────────────────────────────────────────────────
function safeFloat(v) { const f = parseFloat(v); return isNaN(f) ? null : f; }

function riskLabel(s) {
  if (s === null) return 'N/A';
  if (s < 0.2) return 'Low';
  if (s < 0.4) return 'Low Moderate';
  if (s < 0.6) return 'Moderate';
  if (s < 0.8) return 'High';
  return 'Elevated';
}

function transLabel(s) {
  if (s === null) return 'N/A';
  if (s < 0.2) return 'Very Low';
  if (s < 0.4) return 'Low';
  if (s < 0.6) return 'Moderate';
  if (s < 0.8) return 'High';
  return 'Very High';
}

const RISK_COLORS = {
  'Low': '#4caf72', 'Low Moderate': '#8bc34a',
  'Moderate': '#f5a623', 'High': '#e05252', 'Elevated': '#b83232', 'N/A': '#6b7a85'
};
const TRANS_LABELS = ['Very Low', 'Low', 'Moderate', 'High', 'Very High'];

function parsePipe(v) {
  if (!v || !v.trim()) return [];
  return v.split('|').map(s => s.trim()).filter(Boolean);
}

function topN(obj, n) {
  return Object.entries(obj).sort((a, b) => b[1] - a[1]).slice(0, n);
}

function computeStats(rows) {
  let riskSum = 0, riskN = 0, transSum = 0, transN = 0;
  let alertCount = 0, warnCount = 0, docCount = 0;
  const riskDist = {}, transDist = {};
  const warnings = {}, docs = {}, prodRegs = {}, indRegs = {}, countries = {};

  for (const row of rows) {
    const rs = safeFloat(row['topline_risk_score']);
    const ts = safeFloat(row['transparency_score']);
    if (rs !== null) { riskSum += rs; riskN++; }
    if (ts !== null) { transSum += ts; transN++; }
    if ((safeFloat(row['all_alerts_count']) || 0) > 0) alertCount++;
    if (row['Warnings'] && row['Warnings'].trim()) warnCount++;
    if (row['Documents'] && row['Documents'].trim()) docCount++;

    const rl = riskLabel(rs); riskDist[rl] = (riskDist[rl] || 0) + 1;
    const tl = transLabel(ts); transDist[tl] = (transDist[tl] || 0) + 1;

    for (const w of parsePipe(row['Warnings']))             warnings[w]  = (warnings[w]  || 0) + 1;
    for (const d of parsePipe(row['Documents']))            docs[d]       = (docs[d]       || 0) + 1;
    for (const p of parsePipe(row['Product Regulations']))  prodRegs[p]   = (prodRegs[p]   || 0) + 1;
    for (const i of parsePipe(row['Industry Regulations'])) indRegs[i]    = (indRegs[i]    || 0) + 1;
    for (const c of parsePipe(row['Countries']))            countries[c]  = (countries[c]  || 0) + 1;
  }

  const sortedByRisk = [...rows].sort((a, b) => (safeFloat(b['topline_risk_score']) || 0) - (safeFloat(a['topline_risk_score']) || 0));

  return {
    total: rows.length,
    avgRisk:  riskN  > 0 ? riskSum  / riskN  : 0,
    avgTrans: transN > 0 ? transSum / transN : 0,
    riskDist, transDist,
    alertCount, warnCount, docCount,
    regCount: new Set([...Object.keys(prodRegs), ...Object.keys(indRegs)]).size,
    topWarnings:  topN(warnings,  8),
    topDocs:      topN(docs,      8),
    topProdRegs:  topN(prodRegs,  9),
    topIndRegs:   topN(indRegs,   9),
    topCountries: topN(countries, 8),
    topRisky:     sortedByRisk.slice(0, 7),
    warnSuppliers: sortedByRisk.filter(r => r['Warnings'] && r['Warnings'].trim()).slice(0, 6),
  };
}

// ── HTML builders ─────────────────────────────────────────────────────────────
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else el.setAttribute(k, v);
  }
  for (const c of children) {
    if (typeof c === 'string') el.insertAdjacentHTML('beforeend', c);
    else if (c) el.appendChild(c);
  }
  return el;
}

function slide(headerTitle, bodyFn, footerText) {
  const s = h('div', { class: 'slide' });
  if (headerTitle) {
    s.appendChild(h('div', { class: 'slide-header' }, `<h2>${headerTitle}</h2>`));
  }
  const body = h('div', { class: 'slide-body' });
  bodyFn(body);
  s.appendChild(body);
  if (footerText) s.appendChild(h('div', { class: 'slide-footer' }, footerText));
  return s;
}

function barChart(parent, title, entries, total, color) {
  const wrap = h('div', {});
  wrap.appendChild(h('div', { class: 'chart-title' }, title));
  for (const [label, count] of entries) {
    const pct = total > 0 ? (count / total) * 100 : 0;
    const row = h('div', { class: 'bar-row' });
    row.appendChild(h('div', { class: 'bar-label', title: label }, label));
    const track = h('div', { class: 'bar-track' });
    track.appendChild(h('div', { class: 'bar-fill', style: { width: pct + '%', background: color } }));
    row.appendChild(track);
    row.appendChild(h('div', { class: 'bar-count' }, String(count)));
    wrap.appendChild(row);
  }
  parent.appendChild(wrap);
}

function statBox(label, value, accent, colorHex) {
  const box = h('div', { class: accent ? 'stat-box accent' : 'stat-box' });
  const val = h('div', { class: 'val' }, String(value));
  if (colorHex) val.style.color = colorHex;
  box.appendChild(val);
  box.appendChild(h('div', { class: 'lbl' }, label));
  return box;
}

// ── Slide builders ────────────────────────────────────────────────────────────
function buildCover(company, quarter) {
  const s = h('div', { class: 'slide slide-cover' });
  s.appendChild(h('div', { class: 'tag' }, 'FRDM · Quarterly Business Review'));
  s.appendChild(h('h1', {}, 'Quarterly Business Review'));
  s.appendChild(h('div', { class: 'company' }, company));
  s.appendChild(h('div', { class: 'meta' }, `${quarter} &nbsp;·&nbsp; Prepared by FRDM &nbsp;·&nbsp; Confidential`));
  return s;
}

function buildExecSummary(stats) {
  return slide('Executive Summary', body => {
    const row = h('div', { class: 'stat-row' });
    row.appendChild(statBox('Total Suppliers Monitored', stats.total.toLocaleString(), true));
    row.appendChild(statBox('Avg Risk Score', stats.avgRisk.toFixed(2), false, RISK_COLORS[riskLabel(stats.avgRisk)]));
    row.appendChild(statBox('Avg Transparency', stats.avgTrans.toFixed(2), false, '#0085F2'));
    row.appendChild(statBox('Suppliers w/ Alerts', stats.alertCount));
    body.appendChild(row);

    const cols = h('div', { class: 'two-col' });
    const left = h('div', {}); const right = h('div', {});

    barChart(left, 'Risk Distribution',
      ['Low','Low Moderate','Moderate','High','Elevated'].map(l => [l, stats.riskDist[l] || 0]),
      stats.total, '#0085F2');

    barChart(right, 'Transparency Distribution',
      TRANS_LABELS.map(l => [l, stats.transDist[l] || 0]),
      stats.total, '#1A3658');

    cols.appendChild(left); cols.appendChild(right);
    body.appendChild(cols);
  }, `Suppliers flagged with warnings: ${stats.warnCount}  ·  Suppliers with documents: ${stats.docCount}  ·  Unique regulations tracked: ${stats.regCount}`);
}

function buildRiskLandscape(stats) {
  return slide('Supply Chain Risk Landscape', body => {
    const cols = h('div', { class: 'two-col' });
    const left = h('div', {}); const right = h('div', {});

    barChart(left, 'Top Countries by Supplier Exposure', stats.topCountries, stats.total, '#0085F2');

    const rtitle = h('div', { class: 'chart-title' }, 'Highest Risk Suppliers');
    right.appendChild(rtitle);
    for (const row of stats.topRisky) {
      const rs = safeFloat(row['topline_risk_score']);
      const label = riskLabel(rs);
      const name = (row['Supplier'] || 'Unknown').slice(0, 40);
      const scoreStr = rs !== null ? rs.toFixed(2) : 'N/A';
      const sr = h('div', { class: 'supplier-row' });
      sr.appendChild(h('div', { class: 'supplier-name' }, name));
      sr.appendChild(h('div', { class: 'sub-text' }, scoreStr));
      sr.appendChild(h('div', { class: 'risk-chip', style: { background: RISK_COLORS[label] || '#888' } }, label));
      right.appendChild(sr);
    }

    cols.appendChild(left); cols.appendChild(right);
    body.appendChild(cols);
  });
}

function buildWarnings(stats) {
  return slide('Warnings & Trade Risk Signals', body => {
    const row = h('div', { class: 'stat-row', style: { gridTemplateColumns: 'repeat(2,1fr)', marginBottom: '1.5rem' } });
    const pct = stats.total > 0 ? Math.round(stats.warnCount / stats.total * 100) : 0;
    row.appendChild(statBox('Suppliers with Warnings', stats.warnCount, false, stats.warnCount > 0 ? '#e05252' : '#4caf72'));
    row.appendChild(statBox('% of Portfolio', pct + '%'));
    body.appendChild(row);

    const cols = h('div', { class: 'two-col' });
    const left = h('div', {}); const right = h('div', {});

    barChart(left, 'Most Common Warning Types', stats.topWarnings, stats.warnCount || 1, '#e05252');

    const rtitle = h('div', { class: 'chart-title' }, 'Spotlight: High-Risk Warning Suppliers');
    right.appendChild(rtitle);
    for (const row2 of stats.warnSuppliers) {
      const name = (row2['Supplier'] || 'Unknown').slice(0, 36);
      const warns = parsePipe(row2['Warnings']);
      const sr = h('div', { class: 'supplier-row', style: { flexDirection: 'column', alignItems: 'flex-start' } });
      sr.appendChild(h('div', { style: { fontWeight: '600', fontSize: '0.82rem' } }, name));
      if (warns[0]) sr.appendChild(h('div', { style: { fontSize: '0.75rem', color: '#888', marginTop: '2px' } }, warns[0].slice(0, 50)));
      right.appendChild(sr);
    }

    cols.appendChild(left); cols.appendChild(right);
    body.appendChild(cols);
  });
}

function buildRegulations(stats) {
  return slide('Regulatory Exposure', body => {
    const cols = h('div', { class: 'two-col' });
    const left = h('div', {}); const right = h('div', {});
    barChart(left,  'Industry Regulations', stats.topIndRegs,  stats.total, '#1A3658');
    barChart(right, 'Product Regulations',  stats.topProdRegs, stats.total, '#0085F2');
    cols.appendChild(left); cols.appendChild(right);
    body.appendChild(cols);
  }, 'Regulations are tracked across your supply chain by FRDM and updated as legislation changes.');
}

function buildDocuments(stats) {
  return slide('Supplier Documents & Transparency', body => {
    const row = h('div', { class: 'stat-row' });
    row.appendChild(statBox('Suppliers with Documents', stats.docCount, true));
    row.appendChild(statBox('Without Documents', stats.total - stats.docCount));
    row.appendChild(statBox('Avg Transparency Score', stats.avgTrans.toFixed(2), false, '#0085F2'));
    row.appendChild(statBox('Transparency Level', transLabel(stats.avgTrans)));
    body.appendChild(row);

    const cols = h('div', { class: 'two-col' });
    const left = h('div', {}); const right = h('div', {});
    barChart(left, 'Documents on File', stats.topDocs, stats.docCount || 1, '#4caf72');
    barChart(right, 'Transparency Distribution',
      TRANS_LABELS.map(l => [l, stats.transDist[l] || 0]),
      stats.total, '#4caf72');
    cols.appendChild(left); cols.appendChild(right);
    body.appendChild(cols);
  }, 'Transparency scores reflect how much verifiable information exists about a supplier\'s human rights and labor practices.');
}

function buildFrdmValue(stats, company) {
  const s = h('div', { class: 'slide', style: { background: '#072637' } });
  s.appendChild(h('div', { class: 'slide-header' }, '<h2>What We\'ve Found in Your Supply Chain</h2>'));

  const body = h('div', { class: 'slide-body', style: { background: '#072637' } });

  const row = h('div', { class: 'stat-row' });
  row.appendChild(statBox('Suppliers Analyzed', stats.total.toLocaleString(), true));
  row.appendChild(statBox('Regulations Tracked', stats.regCount));
  row.appendChild(statBox('Live Risk Alerts Found', stats.alertCount));
  row.appendChild(statBox('Warnings Identified', stats.warnCount));
  body.appendChild(row);

  const sub = h('div', { style: { fontSize: '0.8rem', fontWeight: '700', color: '#DBE451', margin: '1rem 0 0.5rem', textTransform: 'uppercase', letterSpacing: '0.08em' } },
    `Key Findings for ${company}`);
  body.appendChild(sub);

  const topCountryNames = stats.topCountries.slice(0, 5).map(([c]) => c).join(', ');
  const bullets = [
    `${stats.total.toLocaleString()} suppliers analyzed across ${stats.topCountries.length} countries — including ${topCountryNames}`,
    `${stats.regCount} unique regulatory requirements found to be relevant to ${company}'s supply chain`,
    `${stats.warnCount} suppliers identified with active warnings — including forced labor, trade restrictions, and tariff risks`,
    `${stats.alertCount} suppliers flagged with live risk alerts that warrant further review`,
    `Risk scores continuously refreshed as geopolitical events, sanctions, and regulations evolve`,
    `Transparency scores surfaced to highlight which suppliers lack verifiable human rights disclosures`,
  ];
  const ul = h('ul', { class: 'bullet-list' });
  for (const b of bullets) {
    const li = h('li', { style: { color: '#F1EEE8', borderBottomColor: 'rgba(255,255,255,0.08)' } }, b);
    ul.appendChild(li);
  }
  body.appendChild(ul);
  s.appendChild(body);
  return s;
}

function buildTimeSavings(stats, company) {
  // Assumptions (minutes)
  const MINS_PER_SUPPLIER_PROFILE = 30;
  const MINS_PER_WARNING = 10;
  const MINS_PER_REGULATION = 15;

  const profileMins   = stats.total    * MINS_PER_SUPPLIER_PROFILE;
  const warningMins   = stats.warnCount * MINS_PER_WARNING;
  const regulationMins = stats.regCount * MINS_PER_REGULATION;
  const totalMins     = profileMins + warningMins + regulationMins;
  const totalHours    = Math.round(totalMins / 60);
  const totalDays     = (totalHours / 8).toFixed(1);

  const s = h('div', { class: 'slide', style: { background: '#072637' } });
  s.appendChild(h('div', { class: 'slide-header' }, '<h2>Time Saved by FRDM</h2>'));

  const body = h('div', { class: 'slide-body', style: { background: '#072637' } });

  const row = h('div', { class: 'stat-row' });
  row.appendChild(statBox('Estimated Hours Saved', totalHours.toLocaleString() + ' hrs', true));
  row.appendChild(statBox('Equivalent Working Days', totalDays + ' days'));
  row.appendChild(statBox('Suppliers Risk-Profiled', stats.total.toLocaleString()));
  row.appendChild(statBox('Warnings Researched', stats.warnCount.toLocaleString()));
  body.appendChild(row);

  const sub = h('div', { style: { fontSize: '0.78rem', fontWeight: '700', color: '#DBE451',
    margin: '1rem 0 0.6rem', textTransform: 'uppercase', letterSpacing: '0.08em' } },
    'What would this take your team to do manually?');
  body.appendChild(sub);

  const breakdownItems = [
    [`Supplier risk profiling (${stats.total.toLocaleString()} suppliers × ${MINS_PER_SUPPLIER_PROFILE} min each)`,
      Math.round(profileMins / 60) + ' hrs'],
    [`Warning research (${stats.warnCount} suppliers × ${MINS_PER_WARNING} min each)`,
      Math.round(warningMins / 60) + ' hrs'],
    [`Regulatory mapping (${stats.regCount} regulations × ${MINS_PER_REGULATION} min each)`,
      Math.round(regulationMins / 60) + ' hrs'],
  ];

  const breakdown = h('div', { style: { marginBottom: '1.25rem' } });
  for (const [label, val] of breakdownItems) {
    const brow = h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      padding: '0.5rem 0.85rem', background: '#1A3658', borderRadius: '8px',
      marginBottom: '0.4rem', fontSize: '0.85rem', border: '1px solid rgba(255,255,255,0.08)' } });
    brow.appendChild(h('span', { style: { color: '#F1EEE8' } }, label));
    brow.appendChild(h('span', { style: { fontWeight: '800', color: '#DBE451', flexShrink: '0', marginLeft: '1rem' } }, val));
    breakdown.appendChild(brow);
  }
  body.appendChild(breakdown);

  const note = h('div', { style: { fontSize: '0.78rem', color: '#B6A9A9', fontStyle: 'italic' } },
    `Estimates assume ${MINS_PER_SUPPLIER_PROFILE} minutes to research a supplier risk profile, ${MINS_PER_WARNING} minutes per warning, and ${MINS_PER_REGULATION} minutes per regulation. FRDM performs this monitoring continuously — not just once.`);
  body.appendChild(note);

  s.appendChild(body);
  return s;
}

// ── Main report builder ───────────────────────────────────────────────────────
function buildReport(rows, company, quarter) {
  const stats = computeStats(rows);
  const container = document.getElementById('slides');
  container.innerHTML = '';

  container.appendChild(buildCover(company, quarter));
  container.appendChild(buildExecSummary(stats));
  container.appendChild(buildRiskLandscape(stats));
  container.appendChild(buildWarnings(stats));
  container.appendChild(buildRegulations(stats));
  container.appendChild(buildDocuments(stats));
  container.appendChild(buildFrdmValue(stats, company));
  container.appendChild(buildTimeSavings(stats, company));

  document.getElementById('setup').style.display = 'none';
  document.getElementById('report').style.display = 'block';
  window.scrollTo(0, 0);
}
</script>

</body>
